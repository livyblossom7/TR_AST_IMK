<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Food Delivery</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/login.css">
</head>

<body>

<section class="auth-wrapper">

    <!-- LEFT SIDE -->
    <div class="auth-form-side">

        <!-- Back -->
        <button class="auth-back-btn" onclick="window.history.back()">
            <i class="bi bi-arrow-left"></i>
        </button>

        <div class="auth-content">

            <!-- Title -->
            <div class="auth-header">
                <h2 class="auth-title">Welcome Back!</h2>
                <p class="auth-subtitle">Login to your account</p>
            </div>

            <!-- Form -->
            <form class="auth-form">

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="youremail@example.com">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>

                    <div class="input-eye-wrap">
                        <input type="password" class="form-control" placeholder="Enter your password">
                        <button type="button" class="toggle-eye">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>

                    <div class="text-end">
                        <a href="#" class="forgot-link">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn-auth-primary">
                    Log In
                </button>

                <!-- Divider -->
                <div class="divider-text">or continue with</div>

                <!-- Social -->
                <div class="social-btn-group">
                    <button type="button" class="social-btn"><i class="bi bi-google"></i></button>
                    <button type="button" class="social-btn"><i class="bi bi-apple"></i></button>
                    <button type="button" class="social-btn"><i class="bi bi-facebook"></i></button>
                </div>

            </form>

        </div>

        <!-- Bottom -->
        <p class="bottom-link">
            Don't have an account?
            <a href="signup.html">Sign Up</a>
        </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-image-side">
        <img src="https://api.builder.io/api/v1/image/assets/TEMP/70d69d8d53a842f913d745a0f20740cb5b165e06?width=1856" class="hero-food-image" alt="Burger">
    </div>

</section>

</body>
</html>
