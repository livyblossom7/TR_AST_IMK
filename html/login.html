<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Food Auth</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container-fluid vh-100">

<div class="row h-100">

    <!-- ================= LEFT ================= -->

    <div class="col-lg-5 auth-side">

        <!-- LOGIN -->

        <div id="loginForm" class="form-box">

            <a href="#" class="back">
                <i class="bi bi-arrow-left"></i>
            </a>

            <h2>Welcome Back!</h2>

            <p>Login to your account</p>

            <form>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        class="form-control"
                        placeholder="your@email.com">

                </div>

                <div class="mb-3">

                    <label>Password</label>

                    <div class="password">

                        <input
                            type="password"
                            class="form-control"
                            placeholder="Enter password">

                        <i class="bi bi-eye"></i>

                    </div>

                </div>

                <div class="text-end">

                    <a href="#">Forgot Password?</a>

                </div>

                <button class="btn btn-login w-100 mt-3">

                    Login

                </button>

            </form>

            <div class="divider">

                <span>OR CONTINUE WITH</span>

            </div>

            <div class="social">

                <button>

                    <i class="bi bi-google"></i>

                </button>

                <button>

                    <i class="bi bi-apple"></i>

                </button>

                <button>

                    <i class="bi bi-facebook"></i>

                </button>

            </div>

            <p class="bottom">

                Don't have an account?

                <a href="#" id="showSignup">

                    Sign Up

                </a>

            </p>

        </div>



        <!-- SIGNUP -->

        <div id="signupForm" class="form-box d-none">

            <a href="#" class="back">

                <i class="bi bi-arrow-left"></i>

            </a>

            <h2>Create Your Account</h2>

            <p>Sign up to get started</p>

            <form>

                <div class="mb-3">

                    <label>Full Name</label>

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Your Name">

                </div>

                <div class="mb-3">

                    <label>Email</label>

                    <input
                        type="email"
                        class="form-control"
                        placeholder="you@example.com">

                </div>

                <div class="mb-3">

                    <label>Password</label>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Password">

                </div>

                <div class="mb-3">

                    <label>Confirm Password</label>

                    <input
                        type="password"
                        class="form-control"
                        placeholder="Confirm Password">

                </div>

                <button class="btn btn-login w-100">

                    Sign Up

                </button>

            </form>

            <div class="divider">

                <span>OR CONTINUE WITH</span>

            </div>

            <div class="social">

                <button>

                    <i class="bi bi-google"></i>

                </button>

                <button>

                    <i class="bi bi-apple"></i>

                </button>

                <button>

                    <i class="bi bi-facebook"></i>

                </button>

            </div>

            <p class="bottom">

                Already have an account?

                <a href="#" id="showLogin">

                    Login

                </a>

            </p>

        </div>

    </div>



    <!-- ================= RIGHT ================= -->

    <div class="col-lg-7 image-side">

        <div class="image-wrapper">

            <img
                id="foodImage"
                src="assets/img/burger.png"
                class="img-fluid">

        </div>

    </div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
