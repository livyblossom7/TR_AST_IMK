            '<path d="M16.3232 7.20284C16.5589 6.48333 17.2125 6 17.9518 6H24.0536C24.7929 6 25.4464 6.48333 25.6821 7.20284L26.1429 8.63636H31.2857C32.2339 8.63636 33 9.42178 33 10.3939C33 11.3661 32.2339 12.1515 31.2857 12.1515H10.7143C9.76607 12.1515 9 11.3661 9 10.3939C9 9.42178 9.76607 8.63636 10.7143 8.63636H15.8571L16.3232 7.20284ZM10.7143 14.7879H31.2857V31.4848C31.2857 33.4237 29.7482 35 27.8571 35H14.1429C12.2518 35 10.7143 33.4237 10.7143 31.4848V14.7879ZM15.4286 18.303C14.7161 18.303 14.1429 18.8907 14.1429 19.6212V30.1667C14.1429 30.8972 14.7161 31.4848 15.4286 31.4848C16.1411 31.4848 16.7143 30.8972 16.7143 30.1667V19.6212C16.7143 18.8907 16.1411 18.303 15.4286 18.303ZM21 18.303C20.2875 18.303 19.7143 18.8907 19.7143 19.6212V30.1667C19.7143 30.8972 20.2875 31.4848 21 31.4848C21.7125 31.4848 22.2857 30.8972 22.2857 30.1667V19.6212C22.2857 18.8907 21.7125 18.303 21 18.303ZM26.5714 18.303C25.8589 18.303 25.2857 18.8907 25.2857 19.6212V30.1667C25.2857 30.8972 25.8589 31.4848 26.5714 31.4848C27.2839 31.4848 27.8571 30.8972 27.8571 30.1667V19.6212C27.8571 18.8907 27.2839 18.303 26.5714 18.303Z" fill="white"/>' +
            '</svg>';

        var store = window.WagbaCart;
        var itemsEl = document.getElementById('cartItems');
        var summaryEl = document.getElementById('cartSummaryLines');
        var totalEl = document.getElementById('cartTotal');
        var countEl = document.getElementById('cartCount');

        function render() {
            var items = store.getCart();
            var total = 0;
            var count = 0;

            itemsEl.innerHTML = items.length ? '' : '<p class="cart-empty">Your cart is empty.</p>';
            summaryEl.innerHTML = '';

            items.forEach(function (item) {
                total += item.price * item.qty;
                count += item.qty;

                var itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.dataset.name = item.name;
                itemEl.innerHTML =
                    '<div class="cart-item-photo"><img src="' + item.image + '" alt="' + item.name + '" /></div>' +
                    '<div class="cart-item-body">' +
                    '<div><p class="cart-item-name">' + item.name + '</p><p class="cart-item-price">$ ' + item.price.toFixed(2) + '</p></div>' +
                    '<div class="cart-item-qty">' +
                    '<button type="button" class="qty-decrease" aria-label="Decrease">-</button>' +
                    '<span class="cart-item-qty-value">' + item.qty + '</span>' +
                    '<button type="button" class="qty-increase" aria-label="Increase">+</button>' +
                    '</div></div>' +
                    '<button class="cart-item-remove" aria-label="Remove item">' + REMOVE_ICON + '</button>';
                itemsEl.appendChild(itemEl);

                var lineEl = document.createElement('div');
                lineEl.className = 'cart-summary-line';
                lineEl.innerHTML = '<span>' + item.name + '<br>' + item.qty + 'x</span><span>$' + (item.price * item.qty).toFixed(2) + '</span>';
                summaryEl.appendChild(lineEl);
            });

            totalEl.textContent = '$' + total.toFixed(2);
            countEl.textContent = '(' + count + ' Items)';
        }

        itemsEl.addEventListener('click', function (e) {
            var itemEl = e.target.closest('.cart-item');
            if (!itemEl) return;
            var name = itemEl.dataset.name;
            var items = store.getCart();
            var entry = items.filter(function (i) { return i.name === name; })[0];
            if (!entry) return;

            if (e.target.closest('.qty-increase')) {
                entry.qty += 1;
                store.saveCart(items);
                render();
            } else if (e.target.closest('.qty-decrease')) {
                entry.qty = Math.max(1, entry.qty - 1);
                store.saveCart(items);
                render();
            } else if (e.target.closest('.cart-item-remove')) {
                items = items.filter(function (i) { return i.name !== name; });
                store.saveCart(items);
                render();
            }
        });

        render();
    })();
</script>
</body>
</html>
