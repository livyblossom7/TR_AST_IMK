<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Wagba</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/signup.css">
</head>

<body>

<section class="auth-wrapper">

    <!-- LEFT SIDE -->
    <div class="auth-form-side">

        <!-- Back -->
        <button class="auth-back-btn" onclick="window.history.back()">
            <i class="bi bi-chevron-left"></i>
        </button>

        <div class="auth-content">

            <!-- Title -->
            <div class="auth-header">
                <h1 class="auth-title">Create Your<br>Account</h1>
                <p class="auth-subtitle">Sign up to get started with your culinary journey.</p>
            </div>

            <!-- Form -->
            <form class="auth-form" id="signupForm" novalidate>

                <div class="form-group">
                    <label for="fullName" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="signupEmail" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="signupEmail" placeholder="youremail@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-eye-wrap">
                        <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-eye" data-target="password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-eye-wrap">
                        <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-eye" data-target="confirmPassword">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="terms-check">
                    <input type="checkbox" id="agreeTerms" class="terms-checkbox" required>
                    <label for="agreeTerms" class="terms-label">
                        I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-auth-primary">
                    Sign Up
                </button>

                <!-- Divider -->
                <div class="divider-text">OR CONTINUE WITH</div>

                <!-- Social -->
                <div class="social-btn-group">
                    <button type="button" class="social-btn" aria-label="Google"><i class="bi bi-google"></i></button>
                    <button type="button" class="social-btn" aria-label="Apple"><i class="bi bi-apple"></i></button>
                    <button type="button" class="social-btn" aria-label="Facebook"><i class="bi bi-facebook"></i></button>
                </div>

            </form>

        </div>

        <!-- Bottom -->
        <p class="bottom-link">
            Already have an account?
            <a href="login.html">Sign In</a>
        </p>

    </div>

    <!-- RIGHT SIDE -->
    <div class="auth-image-side signup-bg">
        <svg class="doodle-pattern" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
                <pattern id="foodDoodle" width="220" height="220" patternUnits="userSpaceOnUse">
                    <path d="M20 60 L60 10 L100 60 Z" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <circle cx="45" cy="45" r="3" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <circle cx="170" cy="45" r="26" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <circle cx="170" cy="45" r="10" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <path d="M20 150 q20 -18 40 0 Z" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <rect x="18" y="150" width="44" height="8" rx="4" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <path d="M20 168 q20 10 40 0 Z" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <path d="M150 140 L156 190 L184 190 L190 140 Z" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <line x1="164" y1="128" x2="164" y2="145" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                    <path d="M95 190 L111 150 L127 190 Z" fill="none" stroke="#F5B400" stroke-width="2" opacity="0.55"/>
                </pattern>
            </defs>
            <rect width="100%" height="100%" fill="url(#foodDoodle)"/>
        </svg>
        <div class="hero-food-icon">🍟</div>
    </div>

</section>

<script>
    document.querySelectorAll('.toggle-eye').forEach(function (btn) {
        btn.addEventListener('click', function () {
            var input = document.getElementById(btn.dataset.target);
            var icon = btn.querySelector('i');
            var isHidden = input.type === 'password';
            input.type = isHidden ? 'text' : 'password';
            icon.classList.toggle('bi-eye', !isHidden);
            icon.classList.toggle('bi-eye-slash', isHidden);
        });
    });
</script>
</body>
</html>
