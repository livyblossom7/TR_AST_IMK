<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - Wagba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="css/base.css" rel="stylesheet">
<link href="css/signup.css" rel="stylesheet">
</head>
<body>

<div class="page-label">Sign Up</div>

<div class="auth-wrapper">
  <!-- Form Side -->
  <div class="auth-form-side">
    <button class="auth-back-btn" onclick="window.history.back()">&#8249;</button>

    <h1 class="auth-title font-serif">Create Your<br>Account</h1>
    <p class="auth-subtitle">Sign up to get started with your culinary journey.</p>

    <form id="signupForm" novalidate>
      <div class="mb-3">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
      </div>

      <div class="mb-3">
        <label for="signupEmail" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="signupEmail" placeholder="youremail@example.com" required>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-eye-wrap">
          <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
          <button type="button" class="toggle-eye" data-target="password">&#128065;</button>
        </div>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <div class="input-eye-wrap">
          <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password" required>
          <button type="button" class="toggle-eye" data-target="confirmPassword">&#128065;</button>
        </div>
      </div>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="agreeTerms" required>
        <label class="form-check-label" for="agreeTerms" style="font-size:0.85rem;">
          I agree to the <a href="#" class="forgot-link">Terms of Service</a> and <a href="#" class="forgot-link">Privacy Policy</a>
        </label>
      </div>

      <button type="submit" class="btn btn-wagba w-100">Sign Up</button>

      <div class="divider-text">OR CONTINUE WITH</div>

      <div class="d-flex justify-content-center gap-3">
        <button type="button" class="social-btn" aria-label="Google">
          <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.7 32.4 29.3 35 24 35c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.1 8.1 3l6-6C34.6 4.5 29.6 2.5 24 2.5 11.8 2.5 2 12.3 2 24.5s9.8 22 22 22 22-9.8 22-22c0-1.5-.1-2.7-.4-4z"/><path fill="#FF3D00" d="M4.3 13.9l6.6 4.8C12.6 15 17.9 12.5 24 12.5c3.1 0 5.9 1.1 8.1 3l6-6C34.6 6.5 29.6 4.5 24 4.5c-8 0-15 4.6-18.6 11.3z"/><path fill="#4CAF50" d="M24 44.5c5.5 0 10.4-1.9 14.2-5.1l-6.6-5.4c-2 1.4-4.6 2.3-7.6 2.3-5.3 0-9.7-3.6-11.3-8.4l-6.6 5.1C9 40 16 44.5 24 44.5z"/><path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1 2.9-2.9 5.2-5.4 6.7l6.6 5.4C40.8 36.6 44 31 44 24.5c0-1.5-.1-2.7-.4-4z"/></svg>
        </button>
        <button type="button" class="social-btn" aria-label="Apple">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#000"><path d="M16.365 1.43c0 1.14-.493 2.27-1.177 3.08-.744.9-1.99 1.57-2.987 1.57-.12 0-.23-.02-.29-.03-.017-.06-.05-.22-.05-.39 0-1.14.55-2.27 1.22-2.98.75-.83 2.05-1.51 3.13-1.55.03.1.14.19.15.3zm3.61 15.4c-.03.06-.5 1.75-1.65 3.46-1.02 1.5-2.09 3-3.76 3-1.65 0-2.13-.96-4.05-.96-1.87 0-2.53.99-4.03.99-1.5 0-2.55-1.4-3.73-3.13-1.55-2.3-2.75-5.85-2.75-9.03 0-4.87 3.17-7.45 6.27-7.45 1.68 0 3.05.99 4.1.99.98 0 2.52-1.05 4.4-1.05.72 0 3.28.06 4.98 2.53-.13.08-2.97 1.75-2.97 5.14 0 3.9 3.32 5.35 3.34 5.51z"/></svg>
        </button>
        <button type="button" class="social-btn" aria-label="Facebook">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2"><path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8v-6.9H7.9v-2.9H10V9.41c0-2.07 1.23-3.21 3.11-3.21.9 0 1.84.16 1.84.16v2.02h-1.04c-1.02 0-1.34.64-1.34 1.3v1.57h2.28l-.36 2.9h-1.92V21.8c4.56-.93 8-4.96 8-9.8z"/></svg>
        </button>
      </div>

      <p class="text-center bottom-link mt-4">
        Already have an account? <a href="login.html">Sign In</a>
      </p>
    </form>
  </div>

  <!-- Image Side -->
  <div class="auth-image-side signup-bg">
    <svg class="doodle-pattern" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
      <g fill="none" stroke="#D9962C" stroke-width="2" opacity="0.5">
        <circle cx="60" cy="60" r="35"/>
        <rect x="250" y="30" width="60" height="70" rx="10"/>
        <path d="M30 250 Q60 220 90 250 Q60 280 30 250 Z"/>
        <polygon points="270,250 320,320 220,320"/>
      </g>
    </svg>
    <div class="hero-food-icon">&#127839;</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
