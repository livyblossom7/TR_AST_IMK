<script>
    function updateCartTotal() {
        let total = 0;
        document.querySelectorAll('.cart-item').forEach(function (item) {
            const price = parseFloat(item.dataset.price);
            const qty = parseInt(item.querySelector('.cart-item-qty-value').textContent, 10);
            total += price * qty;
        });
        document.getElementById('cartTotal').textContent = '$' + total.toFixed(2);
    }

    document.getElementById('cartItems').addEventListener('click', function (e) {
        const item = e.target.closest('.cart-item');
        if (!item) return;
        const qtyEl = item.querySelector('.cart-item-qty-value');
        let qty = parseInt(qtyEl.textContent, 10);

        if (e.target.closest('.cart-item-qty button')) {
            const isIncrease = e.target.closest('.cart-item-qty button').textContent === '+';
            qty = isIncrease ? qty + 1 : Math.max(1, qty - 1);
            qtyEl.textContent = qty;
            updateCartTotal();
        }

        if (e.target.closest('.cart-item-remove')) {
            item.remove();
            updateCartTotal();
        }
    });
</script>
